<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>💊 健康小勇士</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --blue: #3b82f6;
      --blue-dark: #1d4ed8;
      --green: #22c55e;
      --purple: #8b5cf6;
      --orange: #f97316;
      --red: #ef4444;
      --gold: #f59e0b;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(160deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
      min-height: 100vh;
      padding: 20px 16px 40px;
      color: #f8fafc;
    }

    /* ── Header ── */
    .header {
      text-align: center;
      margin-bottom: 24px;
    }
    .header h1 {
      font-size: 26px;
      font-weight: 900;
      background: linear-gradient(135deg, #60a5fa, #a78bfa, #34d399);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }
    .header .subtitle {
      font-size: 13px;
      color: #94a3b8;
      margin-top: 2px;
    }
    .date-pill {
      display: inline-block;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 99px;
      padding: 4px 14px;
      font-size: 12px;
      color: #cbd5e1;
      margin-top: 8px;
    }

    /* ── Card ── */
    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 14px;
      backdrop-filter: blur(10px);
      max-width: 480px;
      margin-left: auto;
      margin-right: auto;
    }
    .card + .card { margin-top: 0; }
    .card-title {
      font-size: 14px;
      font-weight: 700;
      color: #94a3b8;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
    }
    .card-title span:first-child { display: flex; align-items: center; gap: 6px; }

    /* ── Mascot ── */
    .mascot-wrap {
      text-align: center;
      padding: 10px 0 4px;
    }
    .mascot {
      font-size: 72px;
      line-height: 1;
      display: inline-block;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.4));
      transition: transform 0.3s;
    }
    .mascot.pop {
      animation: mascotPop 0.5s cubic-bezier(.36,.07,.19,.97);
    }
    @keyframes mascotPop {
      0%,100% { transform: scale(1) rotate(0deg); }
      25% { transform: scale(1.25) rotate(-8deg); }
      75% { transform: scale(1.15) rotate(8deg); }
    }
    .mascot-msg {
      font-size: 14px;
      color: #cbd5e1;
      margin-top: 8px;
      min-height: 20px;
    }

    /* ── XP Bar ── */
    .xp-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 14px;
    }
    .xp-bar {
      flex: 1;
      height: 10px;
      background: rgba(255,255,255,0.1);
      border-radius: 99px;
      overflow: hidden;
    }
    .xp-fill {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, var(--gold), #f97316);
      transition: width 0.6s cubic-bezier(.4,0,.2,1);
      position: relative;
    }
    .xp-fill::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.4) 50%, transparent 100%);
      animation: shine 2s infinite;
    }
    @keyframes shine {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }
    .xp-label {
      font-size: 12px;
      color: var(--gold);
      font-weight: 700;
      white-space: nowrap;
    }

    /* ── Streak ── */
    .streak {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: linear-gradient(135deg, #dc2626, #f97316);
      border-radius: 99px;
      padding: 5px 14px;
      font-size: 13px;
      font-weight: 800;
      margin-top: 12px;
      box-shadow: 0 4px 15px rgba(239,68,68,0.4);
    }

    /* ── Water ── */
    .water-stat {
      display: flex;
      align-items: baseline;
      gap: 4px;
      margin-bottom: 14px;
    }
    .water-count {
      font-size: 48px;
      font-weight: 900;
      color: var(--blue);
      line-height: 1;
    }
    .water-denom {
      font-size: 20px;
      color: #475569;
      font-weight: 700;
    }
    .water-target {
      font-size: 12px;
      color: #64748b;
      margin-left: auto;
      align-self: center;
    }

    .cups-grid {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 6px;
      margin-bottom: 14px;
    }
    .cup {
      aspect-ratio: 3/4;
      border-radius: 3px 3px 8px 8px;
      border: 2px solid #334155;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.15s, border-color 0.2s;
      background: #0f172a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }
    .cup:hover { transform: scale(1.15); border-color: var(--blue); }
    .cup.filled { border-color: #60a5fa; }
    .cup.filled::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, #60a5fa 0%, #1d4ed8 100%);
      animation: cupFill 0.35s ease;
    }
    .cup-icon { position: relative; z-index: 1; }
    @keyframes cupFill {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }

    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 13px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s, opacity 0.2s, box-shadow 0.2s;
    }
    .btn:hover:not(:disabled) { transform: translateY(-2px); }
    .btn:active:not(:disabled) { transform: translateY(0); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none !important; }

    .btn-water {
      background: linear-gradient(135deg, var(--blue), var(--blue-dark));
      color: white;
      box-shadow: 0 4px 20px rgba(59,130,246,0.4);
    }
    .btn-water:hover:not(:disabled) { box-shadow: 0 6px 25px rgba(59,130,246,0.6); }

    .reset-link {
      background: none;
      border: none;
      font-size: 11px;
      color: #475569;
      cursor: pointer;
      text-decoration: underline;
      padding: 0;
    }
    .reset-link:hover { color: #94a3b8; }

    /* ── Medicine ── */
    .meal-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    .meal-card {
      border: 2px solid #1e293b;
      border-radius: 14px;
      padding: 16px 10px 12px;
      text-align: center;
      cursor: pointer;
      transition: all 0.25s;
      background: rgba(255,255,255,0.03);
    }
    .meal-card:hover { border-color: var(--purple); background: rgba(139,92,246,0.08); }
    .meal-card.taken {
      border-color: var(--green);
      background: rgba(34,197,94,0.08);
    }
    .meal-icon {
      font-size: 30px;
      display: block;
      margin-bottom: 6px;
      transition: transform 0.3s;
    }
    .meal-card.taken .meal-icon { animation: iconPop 0.5s ease; }
    @keyframes iconPop {
      0%,100% { transform: scale(1); }
      40% { transform: scale(1.5) rotate(-5deg); }
      70% { transform: scale(1.3) rotate(5deg); }
    }
    .meal-name { font-size: 14px; font-weight: 700; color: #e2e8f0; }
    .meal-time { font-size: 11px; color: #475569; margin-top: 2px; }
    .meal-status {
      font-size: 11px;
      font-weight: 600;
      color: #475569;
      margin-top: 6px;
    }
    .meal-card.taken .meal-status { color: var(--green); }

    /* ── Reminder / Timer ── */
    .timer-body {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .timer-emoji { font-size: 40px; }
    .timer-info { flex: 1; }
    .timer-task {
      font-size: 13px;
      font-weight: 700;
      color: #94a3b8;
      margin-bottom: 2px;
    }
    .timer-countdown {
      font-size: 34px;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
      color: var(--orange);
      line-height: 1;
    }
    .timer-desc { font-size: 11px; color: #475569; margin-top: 2px; }

    .btn-notify {
      background: linear-gradient(135deg, #f97316, #ea580c);
      color: white;
      margin-top: 14px;
      box-shadow: 0 4px 15px rgba(249,115,22,0.35);
      font-size: 13px;
      padding: 12px;
    }

    /* ── Stats ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    .stat-box {
      background: rgba(255,255,255,0.04);
      border-radius: 12px;
      padding: 14px 8px;
      text-align: center;
    }
    .stat-num {
      font-size: 26px;
      font-weight: 900;
      background: linear-gradient(135deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .stat-lbl { font-size: 11px; color: #64748b; margin-top: 2px; }

    /* ── Floating +pts ── */
    .float-pts {
      position: fixed;
      pointer-events: none;
      font-size: 22px;
      font-weight: 900;
      color: var(--gold);
      text-shadow: 0 2px 8px rgba(0,0,0,0.6);
      animation: floatUp 1.2s ease forwards;
      z-index: 9999;
    }
    @keyframes floatUp {
      0%  { opacity: 1; transform: translateY(0) scale(1); }
      100%{ opacity: 0; transform: translateY(-90px) scale(1.4); }
    }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(15,23,42,0.95);
      border: 1px solid rgba(255,255,255,0.15);
      backdrop-filter: blur(16px);
      border-radius: 14px;
      padding: 12px 20px;
      font-size: 14px;
      font-weight: 600;
      color: #f8fafc;
      white-space: nowrap;
      opacity: 0;
      transition: all 0.35s cubic-bezier(.4,0,.2,1);
      z-index: 9998;
      max-width: 90vw;
      text-align: center;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── Confetti ── */
    .confetti-wrap {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9997;
      overflow: hidden;
    }
    .c-piece {
      position: absolute;
      width: 8px;
      height: 8px;
      top: -20px;
      animation: cFall linear forwards;
    }
    @keyframes cFall {
      to { transform: translateY(105vh) rotate(540deg); opacity: 0; }
    }

    /* ── Progress ring on mascot card ── */
    .progress-ring-wrap {
      position: relative;
      display: inline-block;
      margin-top: 6px;
    }
    .progress-ring-wrap .mascot {
      position: relative;
      z-index: 1;
    }
    .ring-svg {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }
  </style>
</head>
<body>

<div class="header">
  <h1>💊 健康小勇士</h1>
  <p class="subtitle">喝水 × 中藥，每天打卡</p>
  <div class="date-pill" id="datePill"></div>
</div>

<!-- Mascot -->
<div class="card" style="text-align:center; padding-bottom:16px;">
  <div class="mascot-wrap">
    <div class="mascot" id="mascot">🌱</div>
    <p class="mascot-msg" id="mascotMsg">今天的健康任務開始囉！加油！</p>
  </div>
  <div class="xp-row">
    <div class="xp-bar"><div class="xp-fill" id="xpFill" style="width:0%"></div></div>
    <div class="xp-label" id="xpLabel">0/11</div>
  </div>
  <div>
    <span class="streak" id="streakBadge">🔥 連續 <span id="streakDays">0</span> 天</span>
  </div>
</div>

<!-- Water -->
<div class="card">
  <div class="card-title">
    <span>💧 今日喝水</span>
    <button class="reset-link" onclick="resetWater()">重置</button>
  </div>
  <div class="water-stat">
    <div class="water-count" id="waterCount">0</div>
    <div class="water-denom">/ 8 杯</div>
    <div class="water-target">目標 2000 ml</div>
  </div>
  <div class="cups-grid" id="cupsGrid"></div>
  <button class="btn btn-water" id="waterBtn" onclick="addWater()">
    ＋ 我剛喝了一杯水！
  </button>
</div>

<!-- Medicine -->
<div class="card">
  <div class="card-title"><span>🌿 中藥打卡</span></div>
  <div class="meal-grid" id="mealGrid"></div>
</div>

<!-- Timer -->
<div class="card">
  <div class="card-title"><span>⏰ 下次提醒</span></div>
  <div class="timer-body">
    <div class="timer-emoji" id="timerEmoji">💧</div>
    <div class="timer-info">
      <div class="timer-task" id="timerTask">計算中…</div>
      <div class="timer-countdown" id="countdown">--:--</div>
      <div class="timer-desc">距離下次提醒</div>
    </div>
  </div>
  <button class="btn btn-notify" onclick="requestNotify()">🔔 開啟瀏覽器通知提醒</button>
</div>

<!-- Stats -->
<div class="card">
  <div class="card-title"><span>📊 累計紀錄</span></div>
  <div class="stats-grid">
    <div class="stat-box">
      <div class="stat-num" id="stWater">0</div>
      <div class="stat-lbl">喝水總杯數</div>
    </div>
    <div class="stat-box">
      <div class="stat-num" id="stMeds">0</div>
      <div class="stat-lbl">吃藥次數</div>
    </div>
    <div class="stat-box">
      <div class="stat-num" id="stDays">0</div>
      <div class="stat-lbl">完成天數</div>
    </div>
  </div>
</div>

<script>
// ─── Constants ───
const WATER_GOAL = 8;
const MAX_XP     = 11; // 8 water + 3 meds
const MEALS = [
  { id: 'breakfast', name: '早餐', time: '08:00', hour: 8,  icon: '🌅' },
  { id: 'lunch',     name: '午餐', time: '12:00', hour: 12, icon: '☀️' },
  { id: 'dinner',    name: '晚餐', time: '18:00', hour: 18, icon: '🌙' },
];
const MASCOTS = [
  { e: '🌱', msg: '今天的健康任務開始囉！加油！' },
  { e: '🌿', msg: '好的開始！繼續保持！' },
  { e: '🌻', msg: '你的身體正在感謝你！' },
  { e: '🌺', msg: '太棒了！健康寶寶！' },
  { e: '🏆', msg: '完美！今日任務全部達成！✨' },
];
const WATER_INTERVAL_MIN = 90; // remind every 90 min

// ─── State ───
let state = loadState();
let notifyEnabled = false;
let toastTimer = null;

function todayKey() {
  return new Date().toISOString().slice(0, 10);
}
function yesterdayKey() {
  const d = new Date(); d.setDate(d.getDate() - 1);
  return d.toISOString().slice(0, 10);
}
function loadState() {
  const today = todayKey();
  const raw = JSON.parse(localStorage.getItem('hq_v2') || '{}');
  if (raw.date === today) return raw;

  // New day
  const streakCarry = (raw.date === yesterdayKey() && raw.completed)
    ? (raw.streak || 0) + 1
    : (raw.streak || 0);

  return {
    date: today,
    water: 0,
    meals: { breakfast: false, lunch: false, dinner: false },
    streak: streakCarry,
    completed: false,
    totalWater: raw.totalWater || 0,
    totalMeds:  raw.totalMeds  || 0,
    totalDays:  raw.totalDays  || 0,
  };
}
function save() { localStorage.setItem('hq_v2', JSON.stringify(state)); }

// ─── XP ───
function xp() {
  return state.water + Object.values(state.meals).filter(Boolean).length;
}
function syncMascot() {
  const pct = xp() / MAX_XP;
  const idx = pct === 0 ? 0 : pct < 0.31 ? 1 : pct < 0.61 ? 2 : pct < 1 ? 3 : 4;
  const m = MASCOTS[idx];
  document.getElementById('mascot').textContent    = m.e;
  document.getElementById('mascotMsg').textContent = m.msg;
  document.getElementById('xpFill').style.width    = `${(xp() / MAX_XP) * 100}%`;
  document.getElementById('xpLabel').textContent   = `${xp()}/${MAX_XP}`;
  document.getElementById('streakDays').textContent = state.streak;

  if (xp() === MAX_XP && !state.completed) {
    state.completed = true;
    state.totalDays++;
    save();
    triggerConfetti();
    toast('🏆 今日任務全部完成！連續 ' + state.streak + ' 天！');
  }
}
function syncStats() {
  document.getElementById('stWater').textContent = state.totalWater;
  document.getElementById('stMeds').textContent  = state.totalMeds;
  document.getElementById('stDays').textContent  = state.totalDays;
}

// ─── Water ───
function renderCups() {
  const grid = document.getElementById('cupsGrid');
  grid.innerHTML = '';
  for (let i = 0; i < WATER_GOAL; i++) {
    const div = document.createElement('div');
    const filled = i < state.water;
    div.className = 'cup' + (filled ? ' filled' : '');
    div.innerHTML = `<span class="cup-icon">${filled ? '💧' : '🫙'}</span>`;
    div.title = filled ? '點擊取消' : '點擊標記';
    div.onclick = () => {
      if (filled) {
        state.water = i;
      } else {
        state.water = i + 1;
        state.totalWater++;
        floatPts('+1 💧');
        popMascot();
      }
      save(); renderCups(); syncMascot(); syncStats();
    };
    grid.appendChild(div);
  }
  const btn = document.getElementById('waterBtn');
  const done = state.water >= WATER_GOAL;
  btn.disabled = done;
  btn.textContent = done ? '✅ 今日喝水目標達成！' : '＋ 我剛喝了一杯水！';
  document.getElementById('waterCount').textContent = state.water;
}
function addWater() {
  if (state.water >= WATER_GOAL) return;
  state.water++;
  state.totalWater++;
  save(); renderCups(); syncMascot(); syncStats();
  floatPts('+1 💧'); popMascot();
  if (state.water === WATER_GOAL) toast('💧 喝水達標！今日水分充足！');
}
function resetWater() {
  if (!confirm('確定要重置今日喝水紀錄？')) return;
  state.water = 0; save(); renderCups(); syncMascot();
}

// ─── Medicine ───
function renderMeals() {
  const grid = document.getElementById('mealGrid');
  grid.innerHTML = '';
  MEALS.forEach(meal => {
    const taken = state.meals[meal.id];
    const div = document.createElement('div');
    div.className = 'meal-card' + (taken ? ' taken' : '');
    div.innerHTML = `
      <span class="meal-icon">${meal.icon}</span>
      <div class="meal-name">${meal.name}</div>
      <div class="meal-time">${meal.time}</div>
      <div class="meal-status">${taken ? '✅ 已服藥' : '點我打卡'}</div>
    `;
    div.onclick = () => {
      const wasTaken = state.meals[meal.id];
      state.meals[meal.id] = !wasTaken;
      if (!wasTaken) {
        state.totalMeds++;
        floatPts('+1 🌿');
        popMascot();
        toast(`${meal.icon} ${meal.name}中藥打卡成功！`);
      }
      save(); renderMeals(); syncMascot(); syncStats();
    };
    grid.appendChild(div);
  });
}

// ─── Countdown ───
function updateTimer() {
  const now = new Date();
  const hh = now.getHours(), mm = now.getMinutes(), ss = now.getSeconds();
  const nowMin = hh * 60 + mm;

  // water: next multiple of WATER_INTERVAL_MIN
  const waterLeft = (WATER_INTERVAL_MIN - (nowMin % WATER_INTERVAL_MIN)) * 60 - ss;

  // meds: find nearest future meal reminder
  const medOptions = MEALS.map(m => {
    const targetMin = m.hour * 60;
    let diff = targetMin - nowMin;
    if (diff < 0) diff += 24 * 60;
    return { label: `${m.name}中藥`, icon: m.icon, sec: diff * 60 - ss };
  }).filter(o => o.sec > 0).sort((a, b) => a.sec - b.sec);

  let sec, label, icon;
  if (medOptions.length && medOptions[0].sec < waterLeft) {
    ({ sec, label, icon } = medOptions[0]);
  } else {
    sec = waterLeft; label = '喝水提醒'; icon = '💧';
  }

  sec = Math.max(0, sec);
  const h = Math.floor(sec / 3600);
  const m2 = Math.floor((sec % 3600) / 60);
  const s2 = sec % 60;
  const str = h > 0
    ? `${h}:${pad(m2)}:${pad(s2)}`
    : `${pad(m2)}:${pad(s2)}`;

  document.getElementById('countdown').textContent = str;
  document.getElementById('timerTask').textContent  = label;
  document.getElementById('timerEmoji').textContent = icon;

  // Fire browser notification at T=0
  if (sec === 0 && notifyEnabled) {
    new Notification('健康小勇士', {
      body: label === '喝水提醒' ? '💧 該喝水了！' : `🌿 該吃${label.replace('中藥','')}的中藥了！`,
    });
  }
}
function pad(n) { return String(n).padStart(2, '0'); }

// ─── Notifications ───
function requestNotify() {
  if (!('Notification' in window)) { toast('❌ 瀏覽器不支援通知'); return; }
  Notification.requestPermission().then(p => {
    if (p === 'granted') { notifyEnabled = true; toast('🔔 通知已開啟！'); }
    else toast('❌ 通知權限被拒絕，請在瀏覽器設定中允許。');
  });
}

// ─── UI helpers ───
function popMascot() {
  const el = document.getElementById('mascot');
  el.classList.remove('pop');
  void el.offsetWidth;
  el.classList.add('pop');
}
function floatPts(text) {
  const el = document.createElement('div');
  el.className = 'float-pts';
  el.textContent = text;
  el.style.left = (20 + Math.random() * 60) + '%';
  el.style.top  = '35%';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1300);
}
function toast(msg) {
  clearTimeout(toastTimer);
  const el = document.querySelector('.toast') || (() => {
    const t = document.createElement('div');
    t.className = 'toast';
    document.body.appendChild(t);
    return t;
  })();
  el.textContent = msg;
  el.classList.add('show');
  toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}
function triggerConfetti() {
  const wrap = document.createElement('div');
  wrap.className = 'confetti-wrap';
  document.body.appendChild(wrap);
  const colors = ['#f59e0b','#ef4444','#22c55e','#3b82f6','#a78bfa','#f97316'];
  for (let i = 0; i < 80; i++) {
    const p = document.createElement('div');
    p.className = 'c-piece';
    p.style.left = Math.random() * 100 + 'vw';
    p.style.background = colors[~~(Math.random() * colors.length)];
    p.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    p.style.animationDuration = (1.5 + Math.random() * 2) + 's';
    p.style.animationDelay = (Math.random() * 0.6) + 's';
    wrap.appendChild(p);
  }
  setTimeout(() => wrap.remove(), 5000);
}

// ─── Date display ───
function updateDate() {
  const d = new Date();
  const days = ['日','一','二','三','四','五','六'];
  document.getElementById('datePill').textContent =
    `${d.getMonth()+1}月${d.getDate()}日（星期${days[d.getDay()]}）`;
}

// ─── Day rollover check ───
function checkDayRollover() {
  const today = todayKey();
  if (state.date !== today) {
    state = loadState();
    renderCups(); renderMeals(); syncMascot(); syncStats();
    updateDate();
  }
}

// ─── Init ───
function init() {
  updateDate();
  renderCups();
  renderMeals();
  syncMascot();
  syncStats();
  updateTimer();
  setInterval(updateTimer, 1000);
  setInterval(checkDayRollover, 60_000);
}

init();
</script>
